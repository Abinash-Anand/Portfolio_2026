<nav class="project-progress  z-50  backdrop-blur">

  <div class="max-w-6xl mx-auto px-4 md:px-8 py-8">

    <ul class="progress-wrapper">

      <div class="progress-line"></div>

      @for (section of sections; track section.id) {
        <li class="cursorEvent" (click)="changeProgressBar(section)">
          <a class="progress-dot">
            <span></span>
          </a>

          <p>{{ section.label }}</p>
        </li>
      }

    </ul>

  </div>

</nav>
